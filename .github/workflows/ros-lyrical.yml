name: lyrical
on:
  push:
    branches:
      - 'main'
      - 'develop'
      - 'lyrical'
  pull_request:
    branches:
      - 'main'
      - 'develop'
      - 'lyrical'
  workflow_dispatch:
    branches:
      - '*'
jobs:
  ros_lyrical:
    name: lyrical
    runs-on: ubuntu-26.04
    strategy:
      fail-fast: false
    steps:
      - name: Checkout LVR2
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compile LVR2 in ROS 2 lyrical WS
        uses: 'ros-industrial/industrial_ci@master'
        env:
          ROS_DISTRO: lyrical
          ROS_REPO: main
          AFTER_SCRIPT: cd ~/target_ws && ./build/lvr2/bin/lvr2_reconstruct src/lvr2/dat/scan.pts
